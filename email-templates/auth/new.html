<!DOCTYPE html>
<html>
<body style="margin:0;padding:20px;background:#f6f6f6;font-family:Arial,sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;background:#f6f6f6;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="border-collapse:collapse;width:100%;max-width:600px;background:#F4F7FA;border-radius:20px;">
          <tr>
            <td style="padding:32px;">
              <div style="margin:0 0 20px 0;">
                <img src="{{ .LogoURL }}" alt="SP Novate" width="40" height="40" style="display:block;width:40px;height:40px;border:0;border-radius:6px;" />
              </div>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;background:#ffffff;border-radius:12px;">
                <tr>
                  <td style="padding:32px;">
                    <h2 style="color:#2f323c;margin:0 0 14px 0;font-size:36px;line-height:1.1;font-weight:700;">Verify your email address</h2>

                    <p style="color:#4f5565;margin:0 0 20px 0;font-size:15px;line-height:1.5;">
                      Hi {{ .Name }}, use the verification code below to confirm your email address and complete your sign-up.
                    </p>

                    <div style="background:#f3f5fa;border-radius:12px;padding:24px;text-align:center;">
                      <div style="display:inline-block;background:#ffffff;border:1px solid #e3e7f2;border-radius:8px;padding:10px 18px;color:#4c56d8;font-size:36px;font-weight:700;letter-spacing:12px;line-height:1;">
                        {{ .OTP }}
                      </div>

                      <p style="color:#66708b;margin:12px 0 0 0;font-size:12px;font-weight:600;">Expires in 10 minutes</p>
                    </div>

                    <div style="margin-top:16px;">
                      <a href="{{ .VerifyURL }}" style="display:inline-block;background:#221b70;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:18px;font-weight:700;font-size:12px;line-height:1;">Verify email address</a>
                    </div>
                  </td>
                </tr>
              </table>

              <p style="color:#616a7f;margin:18px 0 12px 0;font-size:13px;line-height:1.45;">
                For support and other enquiries please contact us via
                <a href="mailto:support@spevents.com" style="color:#3c6cd8;text-decoration:underline;">support@spevents.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
