<!DOCTYPE html>
<html>
<body style="margin:0;padding:20px;background:#f6f6f6;font-family:Arial,sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;background:#f6f6f6;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="border-collapse:collapse;width:100%;max-width:600px;background:#eef1f7;border-radius:12px;">
          <tr>
            <td style="padding:20px;">
              <div style="height:34px;width:34px;background:#2f2d8f;color:#ffffff;border-radius:6px;text-align:center;line-height:34px;font-weight:bold;font-size:12px;">SP</div>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-top:14px;border-collapse:collapse;background:#ffffff;border-radius:8px;">
                <tr>
                  <td style="padding:22px;">
                    <h2 style="color:#333;font-size:34px;line-height:1.15;margin:0 0 10px 0;">Reset your password</h2>
                    <p style="color:#4a4f5a;margin:0 0 16px 0;">Hi {{ .Name }}, use this code to reset your password.</p>

                    <div style="background:#f2f4fa;border-radius:8px;padding:16px;text-align:center;">
                      <div style="display:inline-block;font-size:34px;font-weight:bold;letter-spacing:12px;color:#3b44bb;background:#ffffff;border:1px solid #e3e7f2;border-radius:8px;padding:10px 16px;">
                        {{ .OTP }}
                      </div>
                      <p style="color:#70778a;margin:12px 0 0 0;font-size:13px;">Expires in 10 minutes</p>
                    </div>

                    <p style="color:#777;margin:16px 0 0 0;">If you did not request a password reset, secure your account immediately.</p>
                  </td>
                </tr>
              </table>

              <p style="color:#6f7484;margin:16px 0 0 0;font-size:13px;">For support and other enquiries please contact support@spevents.com</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
