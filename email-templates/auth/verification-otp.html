<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    @media only screen and (max-width: 620px) {
      .container {
        width: 100% !important;
        border-radius: 0 !important;
      }

      .content {
        padding: 16px !important;
      }

      .otp {
        font-size: 28px !important;
        letter-spacing: 4px !important;
      }

      .button {
        width: 100% !important;
        text-align: center !important;
      }
    }
  </style>
</head>

<body style="margin:0;padding:0;background:#f6f6f6;font-family:Arial,sans-serif;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f6f6f6;">
    <tr>
      <td align="center" style="padding:20px;">

        <!-- Container -->
        <table role="presentation" class="container" width="600" cellspacing="0" cellpadding="0" border="0"
          style="width:600px;max-width:600px;background:#F4F7FA;border-radius:12px;overflow:hidden;">

          <tr>
            <td class="content" style="padding:24px;">

              <!-- Logo -->
              <div style="margin-bottom:16px;">
                <img src="{{ .LogoURL }}" alt="SP Novate" width="40" height="40"
                  style="display:block;border:0;border-radius:6px;" />
              </div>

              <!-- White card -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                style="background:#ffffff;border-radius:10px;">
                <tr>
                  <td style="padding:24px;">

                    <!-- Title -->
                    <h2 style="color:#2F323C;font-size:22px;line-height:1.3;margin:0;">
                      Verify your email address
                    </h2>

                    <!-- Intro -->
                    <p style="color:#4F5565;font-size:14px;line-height:20px;margin:16px 0 0 0;">
                      Hi {{ .Name }}, use the verification code below to complete your sign-up.
                    </p>

                    <!-- OTP Box -->
                    <div style="margin-top:20px;background:#F2F4FA;padding:20px;border-radius:10px;text-align:center;">

                      <p style="margin:0 0 10px 0;font-size:13px;color:#5E6680;">
                        Your verification code:
                      </p>

                      <div class="otp"
                        style="font-size:32px;font-weight:bold;letter-spacing:6px;color:#4C56D8;font-family:monospace;">
                        {{ .OTP }}
                      </div>

                      <p style="margin:10px 0 0 0;color:#5E6680;font-size:12px;">
                        Expires in 10 minutes
                      </p>
                    </div>

                    <!-- Button -->
                    <div style="margin-top:24px;text-align:center;">

                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" class="button">
                        <tr>
                          <td bgcolor="#221B70" style="border-radius:16px;text-align:center;">
                            <a href="{{ .VerifyURL }}"
                              style="display:inline-block;padding:12px 18px;color:#ffffff;text-decoration:none;font-size:13px;font-weight:bold;border-radius:16px;">
                              Verify email address
                            </a>
                          </td>
                        </tr>
                      </table>

                    </div>

                  </td>
                </tr>
              </table>

              <!-- Footer -->
              <p style="margin:20px 0 0 0;color:#5E667E;font-size:12px;line-height:18px;">
                For support, contact
                <a href="mailto:support@spevents.com" style="color:#3C6CD8;">support@spevents.com</a>
                or WhatsApp +234 000 000 0001.
              </p>

              <p style="margin:12px 0 0 0;color:#6f7484;font-size:11px;line-height:18px;">
                <a href="{{ .PrivacyURL }}" style="color:#6f7484;text-decoration:none;">Privacy Policy</a>
                |
                <a href="{{ .TermsURL }}" style="color:#6f7484;text-decoration:none;">Terms of Use</a>
              </p>

            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
